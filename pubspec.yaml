name: jasmine
description: jasmine comic browser

publish_to: 'none'

version: 1.7.21+49

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_svg: ^1.0.0
  flutter_styled_toast: ^2.0.0
  photo_view: ^0.14.0
  event: ^2.1.2
  modal_bottom_sheet: ^3.0.0-pre
  another_xlider: ^1.0.1+2
  scrollable_positioned_list: ^0.2.3
  clipboard: ^0.1.3
  filesystem_picker: ^4.1.0
  window_manager: ^0.3.2
  file_picker: ^10.3.10
  image_picker: ^1.2.0
  permission_handler: ^12.0.1
  zoomable_positioned_list: ^1.1.0
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0

# Xcode 26+ Swift 6.3 编译修复，见 https://github.com/pichillilorenzo/flutter_inappwebview/pull/2809
dependency_overrides:
  flutter_inappwebview_macos:
    git:
      url: https://github.com/pichillilorenzo/flutter_inappwebview.git
      ref: fc33a449
      path: flutter_inappwebview_macos
  flutter_inappwebview_ios:
    git:
      url: https://github.com/pichillilorenzo/flutter_inappwebview.git
      ref: fc33a449
      path: flutter_inappwebview_ios

flutter:
  uses-material-design: true
  assets:
    - lib/assets/
